<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
}

.loader{
    width:50px;
    height:50px;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.countdown{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="loader"></div>
<div class="countdown">
    Mengalihkan dalam <span id="timer">1</span> detik...
</div>

<script>
const targetUrl = "rm358.com/4/11197711?var=fp2&ymid=orys";

let seconds = 1;
const timer = document.getElementById("timer");

const interval = setInterval(() => {
    seconds--;
    timer.textContent = seconds;

    if(seconds <= 0){
        clearInterval(interval);
        window.location.href = targetUrl;
    }
}, 1000);
</script>

</body>
</html>
